<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Loop arrows -->
  <g transform="translate(128,128)" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Circular arrow path -->
    <path d="M 0,-56 A 56,56 0 1,1 -48.5,28" />
    <polygon points="-48.5,28 -36,16 -56,8" fill="white" stroke="none"/>
    <!-- Magnifying glass -->
    <circle cx="8" cy="-4" r="22" stroke-width="7"/>
    <line x1="24" y1="12" x2="40" y2="28" stroke-width="8"/>
  </g>
</svg>
